<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Feel bracket motif -->
  <text x="64" y="52" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#accent)" text-anchor="middle">feel</text>
  <!-- Subtitle -->
  <text x="64" y="80" font-family="'Courier New', monospace" font-size="13" fill="#a78bfa" text-anchor="middle" opacity="0.85">AI-native</text>
  <!-- Decorative line -->
  <line x1="28" y1="90" x2="100" y2="90" stroke="#6c63ff" stroke-width="1.5" opacity="0.5"/>
  <text x="64" y="108" font-family="'Courier New', monospace" font-size="11" fill="#6c63ff" text-anchor="middle" opacity="0.7">.feel</text>
</svg>
